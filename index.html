<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nile Cinemas — Reception QR</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0A0A0A;
      color: #FAFAFA;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
    }

    .brand {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #E8B84B;
      margin-bottom: 8px;
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .sub {
      color: #777;
      font-size: 14px;
      margin-bottom: 36px;
    }

    .qr-wrapper {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      display: inline-block;
      margin-bottom: 32px;
      box-shadow: 0 0 60px rgba(232,184,75,0.15);
    }

    #qr-code canvas, #qr-code img {
      display: block !important;
    }

    .instructions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 36px;
      max-width: 340px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #141414;
      border: 1px solid #2A2A2A;
      border-radius: 10px;
      padding: 12px 16px;
      text-align: left;
    }

    .step-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #E8B84B;
      color: #0A0A0A;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .step-text { font-size: 13px; color: #ccc; }

    .time-display {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      color: #E8B84B;
      margin-bottom: 8px;
    }

    .date-display { font-size: 13px; color: #777; }

    .url-note {
      font-size: 11px;
      color: #444;
      margin-top: 20px;
      word-break: break-all;
    }

    .setup-bar {
      background: #141414;
      border: 1px solid #2A2A2A;
      border-radius: 12px;
      padding: 16px 20px;
      margin-top: 24px;
      max-width: 480px;
      width: 100%;
    }

    .setup-bar label {
      display: block;
      font-size: 11px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .setup-bar input {
      width: 100%;
      background: #1A1A1A;
      border: 1px solid #333;
      color: #FAFAFA;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      outline: none;
    }

    .setup-bar button {
      margin-top: 10px;
      background: #E8B84B;
      color: #0A0A0A;
      border: none;
      border-radius: 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 13px;
      padding: 10px 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="brand">Nile Entertainment</div>
  <h1>Staff Check-In</h1>
  <p class="sub">Scan to mark your attendance</p>

  <div class="qr-wrapper">
    <div id="qr-code"></div>
  </div>

  <div class="instructions">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text">Open your phone camera and point at the QR code</div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text">Tap the link that appears — enter your name</div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-text">Allow location access and tap Check In</div>
    </div>
  </div>

  <div class="time-display" id="live-time">--:--:--</div>
  <div class="date-display" id="live-date">--</div>

  <!-- Admin setup area (hidden in production - remove after setup) -->
  <div class="setup-bar">
    <label>Checkin Page URL (update after deploying)</label>
    <input type="text" id="url-input" placeholder="https://your-site.netlify.app/checkin/" value="" />
    <button onclick="updateQR()">Update QR Code</button>
  </div>

  <p class="url-note" id="url-display"></p>

<script>
  let qrCode = null;

  function generateQR(url) {
    document.getElementById('qr-code').innerHTML = '';
    if (qrCode) { qrCode.clear(); }
    qrCode = new QRCode(document.getElementById('qr-code'), {
      text: url,
      width: 240,
      height: 240,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
    document.getElementById('url-display').textContent = '→ ' + url;
    document.getElementById('url-input').value = url;
  }

  function updateQR() {
    const url = document.getElementById('url-input').value.trim();
    if (url) generateQR(url);
  }

  // Live clock
  function tick() {
    const now = new Date();
    document.getElementById('live-time').textContent = now.toLocaleTimeString('en-GB');
    document.getElementById('live-date').textContent = now.toLocaleDateString('en-GB', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });
  }
  setInterval(tick, 1000);
  tick();

  // Default: generate QR pointing to checkin page
  const defaultURL = window.location.origin + window.location.pathname.replace('qr-display/index.html','') + 'checkin/';
  generateQR(defaultURL);
</script>
</body>
</html>
